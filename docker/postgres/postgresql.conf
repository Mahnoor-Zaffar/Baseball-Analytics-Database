# =============================================================================
# postgresql.conf — tuned for analytical workloads on the Lahman dataset
# This is a development-laptop profile. For a real OLAP box scale work_mem,
# shared_buffers, and effective_cache_size to ~25%, ~50%, and ~75% of RAM.
# =============================================================================

# --- Connections ------------------------------------------------------------
listen_addresses                = '*'
max_connections                 = 50
port                            = 5432

# --- Memory -----------------------------------------------------------------
shared_buffers                  = 256MB        # 25% of an 8 GB dev box
work_mem                        = 64MB         # per sort / hash partition
maintenance_work_mem            = 256MB        # VACUUM, CREATE INDEX, CIC
effective_cache_size            = 1GB          # planner hint, not an allocation

# --- Parallelism (the Lahman fact tables benefit visibly) ------------------
max_worker_processes            = 8
max_parallel_workers            = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers= 4

# --- WAL / checkpoints (analytics = bulk loads, tune for throughput) -------
wal_level                       = replica
checkpoint_timeout              = 15min
max_wal_size                    = 2GB
min_wal_size                    = 200MB
checkpoint_completion_target    = 0.9
wal_compression                 = on
synchronous_commit              = off          # safe for an analytics warehouse

# --- Planner ----------------------------------------------------------------
random_page_cost                = 1.1          # SSD-flavored cost model
effective_io_concurrency        = 200          # tuned for SSD
jit                             = on
default_statistics_target       = 200          # better plans on skewed columns

# --- Observability (mandatory for the senior-level story) ------------------
shared_preload_libraries        = 'pg_stat_statements'
pg_stat_statements.max          = 10000
pg_stat_statements.track        = all
track_io_timing                 = on
track_activity_query_size       = 4096
log_min_duration_statement      = 250         # PRD: queries should be <250ms
log_lock_waits                  = on
log_temp_files                  = 10MB
log_checkpoints                 = on
log_autovacuum_min_duration     = 0

# --- Autovacuum (more aggressive for read-mostly OLAP) ---------------------
autovacuum                      = on
autovacuum_vacuum_scale_factor  = 0.05
autovacuum_analyze_scale_factor = 0.02

# --- Localization -----------------------------------------------------------
datestyle                       = 'iso, mdy'
timezone                        = 'UTC'
lc_messages                     = 'en_US.UTF-8'
lc_monetary                     = 'en_US.UTF-8'
lc_numeric                      = 'en_US.UTF-8'
lc_time                         = 'en_US.UTF-8'
default_text_search_config      = 'pg_catalog.english'
